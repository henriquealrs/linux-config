;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; COLORS
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[colors]
background = #cc000000
foreground = #d0d0d0
muted = #6b6b6b
accent = #5f87af
warning = #ffbe61
critical = #f53c3c
charging = #26A65B
module-bg = #cc1f1f1f


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; BAR
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[bar/main]
width = 100%
height = 38
offset-x = 0
offset-y = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0
padding-left = 2
padding-right = 2
module-margin = 1
separator = ""

enable-ipc = true
wm-restack = i3
override-redirect = false

; Bigger, prettier icons
font-0 = "JetBrainsMono:size=13;4"
font-1 = "JetBrainsMono Nerd Font:size=16;4"

modules-left = tray i3 notification
modules-center = clock
modules-right = cpu memory temperature bluetooth network battery


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; TRAY
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/tray]
type = internal/tray
tray-spacing = 8
tray-size = 24
format-background = ${colors.module-bg}


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; WORKSPACES (i3, REAL ONES)
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/i3]
type = internal/i3

pin-workspaces = true
index-sort = true
strip-wsnumbers = true
enable-click = true
enable-scroll = true

format = <label-state>
format-background = ${colors.module-bg}

; GLOBAL spacing around the whole block
format-padding = 0

; ----- LABELS -----

label-focused = 
label-focused-foreground = ${colors.accent}
label-focused-padding = 1

label-unfocused = 
label-unfocused-foreground = ${colors.muted}
label-unfocused-padding = 1

label-visible = 
label-visible-foreground = ${colors.foreground}
label-visible-padding = 1

label-urgent = 
label-urgent-foreground = ${colors.critical}
label-urgent-padding = 1


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; NOTIFICATIONS (dunst)
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/notification]
type = custom/text
content = 
click-left = dunstctl history-pop
click-right = dunstctl close-all
format-foreground = ${colors.foreground}
format-background = ${colors.module-bg}
content-padding = 2


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; CLOCK
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/clock]
type = internal/date
interval = 1
date = %a %d %b  %H:%M:%S
label = %date%
format-background = ${colors.module-bg}
format-padding = 1


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; SEPARATOR / EXPAND
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/expand]
type = custom/text
content = 
format-foreground = ${colors.muted}
format-background = ${colors.module-bg}
format-padding = 1


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; COLOR PICKER (X11 SAFE)
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/colorpicker]
type = custom/text
content = 
click-left = xcolor -s clipboard
format-background = ${colors.module-bg}
format-padding = 1


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; CPU
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
label =  %percentage%%
format-foreground = ${colors.foreground}
format-background = ${colors.module-bg}
format-padding = 1


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MEMORY
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/memory]
type = internal/memory
interval = 2

format = <label>
label = %{T2}%{T-} %percentage_used%%

format-foreground = ${colors.foreground}
format-background = ${colors.module-bg}
format-padding = 1


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; TEMPERATURE
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/temperature]
type = internal/temperature
interval = 2
thermal-zone = 0
warn-temperature = 75

format = <label>
label =  %temperature-c%

format-foreground = ${colors.foreground}
format-warn-foreground = ${colors.critical}
format-background = ${colors.module-bg}
format-padding = 1


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; BLUETOOTH
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/bluetooth]
type = custom/text
content = 
click-left = /usr/bin/blueman-manager
format-foreground = ${colors.foreground}
format-background = ${colors.module-bg}
format-padding = 1


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; NETWORK
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/network]
type = custom/text
content = 
click-left = /usr/bin/kitty /usr/bin/nmtui
format-foreground = ${colors.foreground}
format-background = ${colors.module-bg}
format-padding = 1


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; BATTERY
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP0
full-at = 95

format-charging = <label-charging>
format-discharging = <label-discharging>
format-full = <label-full>
format-low = <label-low>

label-charging = %percentage%% 󰂄
label-discharging = %percentage%% 󰁹
label-full = %percentage%% 
label-low = %percentage%% 

format-foreground = ${colors.foreground}
format-background = ${colors.module-bg}
format-padding = 1

format-charging-foreground = ${colors.charging}
format-low-foreground = ${colors.warning}

