[colors]
background = ${xrdb:background:#1f1f1f}
foreground = ${xrdb:foreground:#d0d0d0}
color7 = ${xrdb:color7:#d0d0d0}
color8 = ${xrdb:color8:#6b6b6b}
color9 = ${xrdb:color9:#5f87af}
warning = #ffbe61
critical = #f53c3c
charging = #26A65B
module-bg = #cc1f1f1f

[bar/main]
width = 100%
height = 34
offset-x = 0
offset-y = 0
background = #00000000
foreground = ${colors.foreground}
line-size = 0
padding-left = 10
padding-right = 10
module-margin-left = 0
module-margin-right = 0
separator = ""
enable-ipc = true
font-0 = "JetBrainsMono Nerd Font Propo:size=11;2"

modules-left = hypr-workspaces notification
modules-center = clock
modules-right = expand colorpicker cpu memory temperature endpoint bluetooth network battery

tray-position = left
tray-padding = 6
tray-maxsize = 14
tray-background = ${colors.module-bg}

[module/hypr-workspaces]
type = custom/script
exec = ~/.config/polybar/scripts/hypr_workspaces.sh
interval = 1
format = <label>
label = %output%
format-background = ${colors.module-bg}
format-padding = 1

[module/notification]
type = custom/text
content = 
click-left = swaync-client -t -sw
format-foreground = ${colors.color7}
format-background = ${colors.module-bg}
format-padding = 1

[module/clock]
type = internal/date
interval = 1
date = %I:%M:%S %p
label = %date%
format-background = ${colors.module-bg}
format-foreground = ${colors.color7}
format-padding = 1

[module/expand]
type = custom/text
content = 
format-foreground = ${colors.color8}
format-background = ${colors.module-bg}
format-padding = 1

[module/colorpicker]
type = custom/script
exec = ~/.config/polybar/scripts/colorpicker_status.sh
interval = 2
click-left = ~/.config/waybar/scripts/colorpicker.sh
format-background = ${colors.module-bg}
format-padding = 1

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
label = 󰻠
format-foreground = ${colors.color7}
format-background = ${colors.module-bg}
format-padding = 1

[module/memory]
type = internal/memory
interval = 2
format = <label>
label = 
format-foreground = ${colors.color7}
format-background = ${colors.module-bg}
format-padding = 1

[module/temperature]
type = internal/temperature
interval = 2
thermal-zone = 0
warn-temperature = 80
format = <label>
label = 
format-warn = <label-warn>
label-warn = 
format-foreground = ${colors.color7}
format-background = ${colors.module-bg}
format-padding = 1
format-warn-foreground = ${colors.critical}

[module/endpoint]
type = custom/text
content = |
format-foreground = ${colors.color8}
format-background = ${colors.module-bg}
format-padding = 1

[module/bluetooth]
type = custom/script
exec = ~/.config/polybar/scripts/bluetooth.sh
interval = 5
click-right = blueman-manager
format-foreground = ${colors.color7}
format-background = ${colors.module-bg}
format-padding = 1

[module/network]
type = custom/script
exec = ~/.config/polybar/scripts/network.sh
interval = 5
click-left = kitty nmtui
format-foreground = ${colors.color7}
format-background = ${colors.module-bg}
format-padding = 1

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP0
full-at = 95
format-charging = <label-charging>
format-discharging = <label-discharging>
format-low = <label-discharging>
format-full = <label-full>
label-charging = %percentage%% 󰂄
label-discharging = %percentage%% %icon%
label-full = %percentage%% 󰁹
ramp-capacity-0 = 󰁻
ramp-capacity-1 = 󰁼
ramp-capacity-2 = 󰁾
ramp-capacity-3 = 󰂀
ramp-capacity-4 = 󰂂
ramp-capacity-5 = 󰁹
format-foreground = ${colors.color7}
format-background = ${colors.module-bg}
format-padding = 1
format-charging-foreground = ${colors.charging}
format-low-foreground = ${colors.warning}
format-low-at = 30
